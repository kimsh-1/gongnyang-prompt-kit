<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="460" viewBox="0 0 1280 460" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR','NanumGothic',sans-serif">
  <defs>
    <clipPath id="t3-upper"><rect x="648" y="170" width="296" height="64"/></clipPath>
    <clipPath id="t3-lower"><rect x="648" y="234" width="296" height="70"/></clipPath>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4" stop-opacity=".15"/>
      <stop offset=".6" stop-color="#5EEAD4" stop-opacity=".7"/>
      <stop offset="1" stop-color="#5EEAD4" stop-opacity=".2"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="460" rx="20" fill="#0B0D12"/>
  <rect x=".5" y=".5" width="1279" height="459" rx="19.5" fill="none" stroke="#262B36"/>

  <!-- title band -->
  <text x="26" y="42" font-size="19" font-weight="700" fill="#EEF1F7">T축 — 타이포 아트 4기법</text>
  <text x="252" y="42" font-size="12" fill="#8B93A7">글자를 그리는 게 아니라, 성질을 번역한다</text>
  <text x="1254" y="42" font-size="12" font-weight="700" fill="#F4CF7A" text-anchor="end" letter-spacing="1">공냥 프롬프트 킷 VOL.2</text>

  <!-- ================= T1 움직임 번역 ================= -->
  <g>
    <rect x="24" y="64" width="296" height="356" rx="16" fill="#10131A" stroke="#262B36"/>
    <rect x="40" y="82" width="128" height="26" rx="13" fill="#5EEAD4" fill-opacity=".08" stroke="#5EEAD4" stroke-opacity=".35"/>
    <text x="104" y="100" font-size="12.5" font-weight="700" fill="#5EEAD4" text-anchor="middle">T1 · 움직임 번역</text>

    <!-- swell path -->
    <path d="M 48 302 C 96 266, 132 322, 178 284 S 258 306, 296 278" fill="none" stroke="url(#wave)" stroke-width="2.5"/>
    <!-- spray -->
    <circle cx="206" cy="196" r="2.6" fill="#5EEAD4" fill-opacity=".8"/>
    <circle cx="222" cy="184" r="1.8" fill="#5EEAD4" fill-opacity=".55"/>
    <circle cx="236" cy="196" r="1.4" fill="#5EEAD4" fill-opacity=".4"/>
    <circle cx="120" cy="176" r="1.8" fill="#5EEAD4" fill-opacity=".5"/>
    <circle cx="104" cy="190" r="1.3" fill="#5EEAD4" fill-opacity=".35"/>

    <text x="112" y="252" font-size="76" font-weight="800" fill="#EEF1F7" text-anchor="middle" transform="rotate(-12 112 252)">파</text>
    <text x="216" y="278" font-size="64" font-weight="800" fill="#EEF1F7" text-anchor="middle" transform="rotate(9 216 278)">도</text>

    <text x="172" y="356" font-size="12" fill="#8B93A7" text-anchor="middle">파도는 그리지 않는다 — 에너지만 싣는다</text>
    <text x="172" y="392" font-size="10.5" fill="#5B6272" text-anchor="middle">rhythm · trajectory · force → letterform</text>
  </g>

  <!-- ================= T2 의성어 번역 ================= -->
  <g>
    <rect x="336" y="64" width="296" height="356" rx="16" fill="#10131A" stroke="#262B36"/>
    <rect x="352" y="82" width="128" height="26" rx="13" fill="#F2B705" fill-opacity=".08" stroke="#F2B705" stroke-opacity=".35"/>
    <text x="416" y="100" font-size="12.5" font-weight="700" fill="#F2B705" text-anchor="middle">T2 · 의성어 번역</text>

    <text x="404" y="228" font-size="66" font-weight="800" fill="#F2B705" text-anchor="middle">사</text>
    <text x="474" y="246" font-size="58" font-weight="800" fill="#F2B705" fill-opacity=".85" text-anchor="middle" transform="rotate(4 474 246)">르</text>
    <text x="540" y="266" font-size="50" font-weight="800" fill="#F2B705" fill-opacity=".68" text-anchor="middle" transform="rotate(8 540 266)">르</text>
    <!-- drips -->
    <path d="M 536 272 q 3 14 0 24 q -2 8 -5 0 q -3 -10 1 -24 z" fill="#F2B705" fill-opacity=".55"/>
    <path d="M 556 268 q 2 10 0 17 q -2 6 -4 0 q -2 -7 1 -17 z" fill="#F2B705" fill-opacity=".4"/>
    <ellipse cx="540" cy="312" rx="30" ry="5.5" fill="#F2B705" fill-opacity=".22"/>
    <ellipse cx="490" cy="318" rx="12" ry="3" fill="#F2B705" fill-opacity=".12"/>

    <text x="484" y="356" font-size="12" fill="#8B93A7" text-anchor="middle">'사르르'의 결이 글자의 무게를 정한다</text>
    <text x="484" y="392" font-size="10.5" fill="#5B6272" text-anchor="middle">sound texture + 감정·장면 → weight · edges</text>
  </g>

  <!-- ================= T3 의도 왜곡 ================= -->
  <g>
    <rect x="648" y="64" width="296" height="356" rx="16" fill="#10131A" stroke="#262B36"/>
    <rect x="664" y="82" width="118" height="26" rx="13" fill="#F25C9B" fill-opacity=".08" stroke="#F25C9B" stroke-opacity=".35"/>
    <text x="723" y="100" font-size="12.5" font-weight="700" fill="#F25C9B" text-anchor="middle">T3 · 의도 왜곡</text>

    <!-- mint ghost layer -->
    <text x="787" y="259" font-size="60" font-weight="800" fill="#5EEAD4" fill-opacity=".3" text-anchor="middle">야시장</text>
    <!-- sliced pink: lower half in place, upper half offset right -->
    <g clip-path="url(#t3-lower)"><text x="796" y="254" font-size="60" font-weight="800" fill="#F25C9B" text-anchor="middle">야시장</text></g>
    <g clip-path="url(#t3-upper)"><text x="812" y="252" font-size="60" font-weight="800" fill="#F25C9B" text-anchor="middle">야시장</text></g>
    <!-- slice line -->
    <line x1="672" y1="233" x2="920" y2="233" stroke="#0B0D12" stroke-width="3"/>
    <line x1="672" y1="233" x2="920" y2="233" stroke="#EEF1F7" stroke-opacity=".22" stroke-dasharray="4 6"/>

    <text x="796" y="356" font-size="12" fill="#8B93A7" text-anchor="middle">설계된 방향으로만 — 가독 한계선 직전까지</text>
    <text x="796" y="392" font-size="10.5" fill="#5B6272" text-anchor="middle">slice · offset · stretch — 전부 의도된 왜곡</text>
  </g>

  <!-- ================= T4 네거티브 스페이스 ================= -->
  <g>
    <rect x="960" y="64" width="296" height="356" rx="16" fill="#10131A" stroke="#262B36"/>
    <rect x="976" y="82" width="158" height="26" rx="13" fill="#EEF1F7" fill-opacity=".07" stroke="#EEF1F7" stroke-opacity=".3"/>
    <text x="1055" y="100" font-size="12.5" font-weight="700" fill="#EEF1F7" text-anchor="middle">T4 · 네거티브 스페이스</text>

    <!-- giant ㅇ -->
    <circle cx="1108" cy="222" r="60" fill="none" stroke="#EEF1F7" stroke-width="25"/>
    <!-- kite hidden in the counterspace -->
    <g>
      <path d="M 1108 194 L 1126 218 L 1108 244 L 1090 218 Z" fill="#5EEAD4" fill-opacity=".85"/>
      <path d="M 1108 194 L 1108 244 M 1090 218 L 1126 218" stroke="#0B0D12" stroke-width="1.6" stroke-opacity=".55"/>
      <path d="M 1108 244 q 8 12 -2 20" fill="none" stroke="#5EEAD4" stroke-width="1.8" stroke-opacity=".7"/>
    </g>

    <text x="1108" y="330" font-size="23" font-weight="700" fill="#EEF1F7" text-anchor="middle" letter-spacing="6">소풍</text>

    <text x="1108" y="356" font-size="12" fill="#8B93A7" text-anchor="middle">ㅇ의 여백에 연을 숨긴다 — 두 번째에 발견</text>
    <text x="1108" y="392" font-size="10.5" fill="#5B6272" text-anchor="middle">counterspace: o c e a · ㅇ ㅎ ㅁ ㅂ ㅅ ㄷ</text>
  </g>
</svg>
